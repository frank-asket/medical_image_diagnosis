<!doctype html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Medical Image Diagnosis UI</title>
  <style>
    body { font-family: system-ui, -apple-system, Segoe UI, Roboto, Arial, sans-serif; margin: 24px; background: #f7f8fa; color: #111; line-height: 1.5; }
    .card { background: #fff; border: 1px solid #ddd; border-radius: 8px; padding: 16px; margin-bottom: 16px; }
    h1 { margin-top: 0; }
    h2 { margin-top: 0; font-size: 1.15rem; }
    h3 { font-size: 1rem; margin: 1rem 0 0.5rem; color: #24292f; border-bottom: 1px solid #eee; padding-bottom: 4px; }
    label { display: block; margin-bottom: 8px; font-weight: 600; }
    input, select, textarea, button { width: 100%; margin-bottom: 12px; padding: 8px; box-sizing: border-box; }
    button { cursor: pointer; background: #1f6feb; color: #fff; border: none; border-radius: 6px; }
    button:hover { background: #195ecb; }
    pre { background: #0d1117; color: #d2e0ff; padding: 12px; border-radius: 6px; overflow-x: auto; max-height: 320px; font-size: 12px; }
    .row { display: grid; grid-template-columns: 1fr 1fr; gap: 16px; }
    @media (max-width: 900px) { .row { grid-template-columns: 1fr; } }
    .muted { color: #555; font-size: 14px; }
    .report { font-size: 15px; }
    .report p { margin: 0 0 0.75rem; }
    .report ul { margin: 0 0 0.75rem; padding-left: 1.25rem; }
    .report li { margin-bottom: 0.35rem; }
    .pill { display: inline-block; background: #eef2ff; color: #3730a3; padding: 2px 10px; border-radius: 999px; font-size: 13px; margin-right: 6px; margin-bottom: 6px; }
    .empty { color: #666; font-style: italic; }
    details.tech { margin-top: 12px; font-size: 14px; }
    details.tech summary { cursor: pointer; color: #1f6feb; }
    .voice-controls {
      display: flex;
      gap: 8px;
      margin-bottom: 12px;
    }

    .btn-secondary {
      background: #24292f;
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 8px;
    }

    .btn-secondary:hover {
      background: #000;
    }

    .recording {
      background: #cf222e !important;
      animation: pulse 1.5s infinite;
    }

    @keyframes pulse {
      0% { opacity: 1; }
      50% { opacity: 0.7; }
      100% { opacity: 1; }
    }
  </style>
</head>
<body>
  <h1>Medical Image Diagnosis</h1>
  <p class="muted">Upload an image to see an easy-to-read summary. Experts can ask follow-up questions below.</p>

  <div class="card">
    <h2>1) Upload and Diagnose</h2>
    <form id="diagnose-form">
      <label for="image">Medical Image</label>
      <input id="image" name="image" type="file" accept="image/*,.dcm" required />

      <label for="domain">Domain</label>
      <select id="domain" name="domain">
        <option value="auto">Auto</option>
        <option value="radiology">Radiology</option>
        <option value="dermatology">Dermatology</option>
        <option value="ophthalmology">Ophthalmology</option>
      </select>

      <label for="patient-context">Patient Context (optional)</label>
      <textarea id="patient-context" name="patient_context" rows="3" placeholder="Optional context for recommendations"></textarea>

      <button type="submit">Run Diagnosis</button>
    </form>
    <div id="diagnose-status" class="muted"></div>
  </div>

  <div class="row">
    <div class="card">
      <h2>2) Diagnosis Results</h2>
      <div id="results-readable" class="report" aria-live="polite">
        <p class="empty">Run a diagnosis to see a readable summary here.</p>
      </div>
      <details class="tech">
        <summary>Technical details (JSON)</summary>
        <pre id="results-raw">{}</pre>
      </details>
    </div>
    <div class="card">
      <h2>3) Expert Q&amp;A</h2>
      <form id="qa-form">
        <label for="question">Question</label>
        <textarea id="question" rows="4" placeholder="Ask a follow-up question..." required></textarea>
        <button type="submit">Ask Question</button>

        <div class="voice-controls">
          <button type="button" id="voice-btn" class="btn-secondary">
            <span id="mic-icon">🎤</span> <span id="mic-text">Ask with Voice</span>
          </button>
        </div>
      </form>
      <div id="qa-status" class="muted"></div>
      <div id="qa-readable" class="report" aria-live="polite"></div>
      <details class="tech">
        <summary>Technical details (JSON)</summary>
        <pre id="qa-raw">{}</pre>
      </details>
    </div>
  </div>

  <script>
    let currentBundleId = null;
    const diagnoseForm = document.getElementById("diagnose-form");
    const qaForm = document.getElementById("qa-form");
    const diagnoseStatus = document.getElementById("diagnose-status");
    const qaStatus = document.getElementById("qa-status");
    const resultsReadable = document.getElementById("results-readable");
    const resultsRaw = document.getElementById("results-raw");
    const qaReadable = document.getElementById("qa-readable");
    const qaRaw = document.getElementById("qa-raw");

    function escapeHtml(s) {
      if (s == null || s === "") return "";
      const div = document.createElement("div");
      div.textContent = String(s);
      return div.innerHTML;
    }

    function clearEl(el) {
      while (el.firstChild) el.removeChild(el.firstChild);
    }

    function addHeading(container, text) {
      const h = document.createElement("h3");
      h.textContent = text;
      container.appendChild(h);
    }

    function addParagraphs(container, text) {
      if (!text || !String(text).trim()) {
        const p = document.createElement("p");
        p.className = "empty";
        p.textContent = "Not provided.";
        container.appendChild(p);
        return;
      }
      String(text).split(/\n\n+/).forEach((block) => {
        const t = block.trim();
        if (!t) return;
        const p = document.createElement("p");
        p.textContent = t;
        container.appendChild(p);
      });
    }

    function addList(container, items) {
      if (!items || !items.length) {
        const p = document.createElement("p");
        p.className = "empty";
        p.textContent = "None listed.";
        container.appendChild(p);
        return;
      }
      const ul = document.createElement("ul");
      items.forEach((item) => {
        const li = document.createElement("li");
        li.textContent = String(item);
        ul.appendChild(li);
      });
      container.appendChild(ul);
    }

    function pct(conf) {
      if (conf == null || conf === "") return "";
      const n = Number(conf);
      if (Number.isNaN(n)) return "";
      return Math.round(n * 1000) / 10 + "%";
    }

    function renderDiagnosisReadable(result) {
      clearEl(resultsReadable);
      if (!result || typeof result !== "object") {
        const p = document.createElement("p");
        p.className = "empty";
        p.textContent = "No result data.";
        resultsReadable.appendChild(p);
        return;
      }

      const routing = result.routing || {};
      const domain = routing.domain || "—";
      const diag = result.diagnosis || {};
      const pd = diag.provisional_diagnosis || {};
      const interp = result.results_interpretation || {};
      const report = result.medical_report || {};
      const advice = result.contextual_advice || {};

      const summary = document.createElement("div");
      summary.innerHTML =
        '<p><strong>Care area:</strong> ' + escapeHtml(domain) + "</p>" +
        (routing.reason && routing.mode === "auto"
          ? "<p><strong>Why this area:</strong> " + escapeHtml(routing.reason) + "</p>"
          : "") +
        (pd.diagnosis_label
          ? "<p><strong>Working impression:</strong> " + escapeHtml(pd.diagnosis_label) + "</p>"
          : "") +
        (pd.confidence != null
          ? "<p><strong>Model confidence:</strong> " + escapeHtml(pct(pd.confidence)) + "</p>"
          : "") +
        (pd.triage_level
          ? "<p><strong>Suggested urgency band:</strong> " + escapeHtml(pd.triage_level) + "</p>"
          : "");
      resultsReadable.appendChild(summary);

      addHeading(resultsReadable, "In plain language");
      addParagraphs(resultsReadable, interp.layman_interpretation);

      if (interp.disclaimer) {
        addHeading(resultsReadable, "Important");
        addParagraphs(resultsReadable, interp.disclaimer);
      }

      addHeading(resultsReadable, "Summary for your care team");
      addParagraphs(resultsReadable, report.report_body);

      addHeading(resultsReadable, "Suggested next steps");
      const fu = advice.follow_up_suggestions || [];
      const ref = advice.referral_considerations || [];
      const next = advice.next_steps_for_provider || [];
      if (fu.length || ref.length || next.length) {
        if (fu.length) {
          addHeading(resultsReadable, "Follow-up tests or checks");
          addList(resultsReadable, fu);
        }
        if (ref.length) {
          addHeading(resultsReadable, "Types of specialist to consider");
          addList(resultsReadable, ref);
        }
        if (next.length) {
          addHeading(resultsReadable, "Practical next steps");
          addList(resultsReadable, next);
        }
      } else {
        addParagraphs(resultsReadable, advice.uncertainty_notes || diag.clinical_recommendations || "");
      }
      if (advice.uncertainty_notes && (fu.length || ref.length || next.length)) {
        addHeading(resultsReadable, "Uncertainty");
        addParagraphs(resultsReadable, advice.uncertainty_notes);
      }

      addHeading(resultsReadable, "What the image review noted");
      if (diag.findings) addParagraphs(resultsReadable, diag.findings);
      const impression =
        diag.primary_impression || diag.diagnosis_impression || diag.classification;
      if (impression) {
        addHeading(resultsReadable, "Specialist impression");
        addParagraphs(resultsReadable, impression);
      }
      if (diag.clinical_recommendations && !advice.follow_up_suggestions) {
        addHeading(resultsReadable, "Clinical recommendations");
        addParagraphs(resultsReadable, diag.clinical_recommendations);
      }
      if (diag.limitations) {
        addHeading(resultsReadable, "Limitations");
        addParagraphs(resultsReadable, diag.limitations);
      }
      if (diag.disclaimer && diag.disclaimer !== interp.disclaimer) {
        addHeading(resultsReadable, "Image review note");
        addParagraphs(resultsReadable, diag.disclaimer);
      }
    }

    function renderQaReadable(qa) {
      clearEl(qaReadable);
      if (!qa || typeof qa !== "object") {
        qaReadable.innerHTML = '<p class="empty">No answer yet.</p>';
        return;
      }
      const meta = qa._agent_meta;
      addHeading(qaReadable, "Answer");
      addParagraphs(qaReadable, qa.answer);
      addHeading(qaReadable, "Caveats");
      addParagraphs(qaReadable, qa.caveats);
      if (qa.related_topics_to_review && qa.related_topics_to_review.length) {
        addHeading(qaReadable, "Related topics to review");
        addList(qaReadable, qa.related_topics_to_review);
      }
      if (meta && meta.latency_ms != null) {
        const p = document.createElement("p");
        p.className = "muted";
        p.style.fontSize = "13px";
        p.textContent = "Response time: " + meta.latency_ms + " ms";
        qaReadable.appendChild(p);
      }
    }

    diagnoseForm.addEventListener("submit", async (event) => {
      event.preventDefault();
      diagnoseStatus.textContent = "Running diagnosis...";
      qaStatus.textContent = "";
      clearEl(qaReadable);
      qaRaw.textContent = "{}";
      const formData = new FormData(diagnoseForm);
      try {
        const response = await fetch("/api/diagnose", { method: "POST", body: formData });
        const data = await response.json();
        if (!response.ok) throw new Error(data.detail || "Diagnosis failed");
        currentBundleId = data.bundle_id;
        resultsRaw.textContent = JSON.stringify(data.result, null, 2);
        renderDiagnosisReadable(data.result);
        diagnoseStatus.textContent = "Diagnosis complete. You can now ask follow-up questions.";
      } catch (err) {
        diagnoseStatus.textContent = "Error: " + err.message;
        clearEl(resultsReadable);
        resultsReadable.innerHTML = '<p class="empty">Could not load results.</p>';
        resultsRaw.textContent = "{}";
      }
    });

    qaForm.addEventListener("submit", async (event) => {
      event.preventDefault();
      if (!currentBundleId) {
        qaStatus.textContent = "Run a diagnosis first.";
        return;
      }
      const question = document.getElementById("question").value.trim();
      if (!question) {
        qaStatus.textContent = "Question is required.";
        return;
      }
      qaStatus.textContent = "Querying expert assistant...";
      const formData = new FormData();
      formData.append("bundle_id", currentBundleId);
      formData.append("question", question);
      try {
        const response = await fetch("/api/qa", { method: "POST", body: formData });
        const data = await response.json();
        if (!response.ok) throw new Error(data.detail || "Q&A failed");
        qaRaw.textContent = JSON.stringify(data.clinical_qa, null, 2);
        renderQaReadable(data.clinical_qa);
        qaStatus.textContent = "Answer received.";
      } catch (err) {
        qaStatus.textContent = "Error: " + err.message;
        clearEl(qaReadable);
        qaRaw.textContent = "{}";
      }
    });


    let mediaRecorder;
    let audioChunks = [];
    let startTime;
    let timerInterval;

    const recordBtn = document.getElementById("voice-btn");
    const micText = document.getElementById("mic-text");
    const recordingTime = document.getElementById("recording-time");

    recordBtn.addEventListener("click", async () => {
      if (!mediaRecorder || mediaRecorder.state === "inactive") {
        try {
          const stream = await navigator.mediaDevices.getUserMedia({ audio: true });
          mediaRecorder = new MediaRecorder(stream);
          audioChunks = [];

          mediaRecorder.ondataavailable = (event) => {
            audioChunks.push(event.data);
          };

          mediaRecorder.onstop = () => {
            const audioBlob = new Blob(audioChunks, { type: 'audio/webm' });
            recordBtn.audioBlob = audioBlob; 
            micText.textContent = "Audio Captured (Ready)";
            recordBtn.classList.remove("recording");
          };

          mediaRecorder.start();
          startTimer();
          recordBtn.classList.add("recording");
          micText.textContent = "Stop Recording";
        } catch (err) {
          qaStatus.textContent = "Microphone access denied: " + err.message;
        }
      } else {
        mediaRecorder.stop();
        stopTimer();
        mediaRecorder.stream.getTracks().forEach(track => track.stop()); 
      }
    });

    function startTimer() {
      startTime = Date.now();
      recordingTime.style.display = "block";
      timerInterval = setInterval(() => {
        const seconds = Math.floor((Date.now() - startTime) / 1000);
        recordingTime.textContent = `Recording: ${seconds}s`;
      }, 1000);
    }

    function stopTimer() {
      clearInterval(timerInterval);
    }

    // UPDATE THE QA SUBMIT HANDLER
    qaForm.addEventListener("submit", async (event) => {
      event.preventDefault();
      if (!currentBundleId) {
        qaStatus.textContent = "Run a diagnosis first.";
        return;
      }

      const questionText = document.getElementById("question").value.trim();
      const audioBlob = recordBtn.audioBlob;

      if (!questionText && !audioBlob) {
        qaStatus.textContent = "Please provide a text question or a voice recording.";
        return;
      }

      qaStatus.textContent = "Uploading to expert assistant...";
      const formData = new FormData();
      formData.append("bundle_id", currentBundleId);
      
      if (questionText) formData.append("question", questionText);
      if (audioBlob) formData.append("audio_file", audioBlob, "query.webm");

      try {
        const response = await fetch("/api/qa", { method: "POST", body: formData });
        const data = await response.json();
        if (!response.ok) throw new Error(data.detail || "Q&A failed");
        
        renderQaReadable(data.clinical_qa);
        qaStatus.textContent = "Answer received.";
        // Reset audio after successful send
        recordBtn.audioBlob = null;
        micText.textContent = "Start Recording";
      } catch (err) {
        qaStatus.textContent = "Error: " + err.message;
      }
    });
  </script>
</body>
</html>
